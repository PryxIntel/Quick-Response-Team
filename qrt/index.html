<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRT - Quick Response Team Command Center</title>
    
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23da3633' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3Ccircle cx='12' cy='11' r='3'/%3E%3C/svg%3E" type="image/svg+xml">
    
    <style>
        body {
            background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace;
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }
        /* Left Panel - Command Center */
        .command-center {
            flex: 1; padding: 40px; border-right: 2px solid #30363d; display: flex; flex-direction: column;
        }
        h1 { color: #58a6ff; margin-top: 0; letter-spacing: 2px;}
        .console-box {
            background-color: #010409; border: 1px solid #30363d; padding: 20px;
            flex-grow: 1; overflow-y: auto; margin-bottom: 20px; border-radius: 6px;
        }
        .log { margin: 5px 0; }
        .log.system { color: #8b949e; }
        .log.alert { color: #ff7b72; font-weight: bold; }
        .log.success { color: #3fb950; }
        .btn-trigger {
            background-color: #da3633; color: white; padding: 15px; border: none;
            border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer;
            transition: background 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-trigger:hover { background-color: #f85149; }
        .btn-trigger:disabled { background-color: #484f58; cursor: not-allowed; }

        /* Right Panel - Mobile Device */
        .mobile-view {
            width: 400px; display: flex; justify-content: center; align-items: center; background-color: #161b22;
        }
        .phone {
            width: 300px; height: 600px; background-color: #000; border: 10px solid #21262d;
            border-radius: 30px; position: relative; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); transition: background-color 0.1s;
        }
        .phone.flashing { background-color: #da3633; animation: flash 0.5s infinite; }
        
        @keyframes flash { 0% { background-color: #da3633; } 50% { background-color: #ff7b72; } 100% { background-color: #da3633; } }

        .phone-screen { padding: 20px; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: none; }
        .phone.active .phone-screen { display: block; }
        .alert-header { display: flex; align-items: center; color: white; font-weight: bold; font-size: 20px; margin-bottom: 15px;}
        .alert-icon { font-size: 24px; margin-right: 10px; }
        .alert-body { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; line-height: 1.5;}
        
        /* New Dynamic Data Styles */
        .threat-title { font-size: 18px; color: #ffcccc; margin-bottom: 5px; display: block; font-weight: 900;}
        .meta-data { font-size: 12px; color: #e6e6e6; margin-bottom: 10px; display: block; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;}
        .instructions { font-size: 14px; margin-bottom: 15px; display: block;}
        
    </style>
</head>
<body>

    <div class="command-center">
        <h1>[QRT] COMMAND CENTER</h1>
        <p>System Status: <span style="color: #3fb950;">ONLINE</span> | Location: Gorakhpur Hub</p>
        
        <div class="console-box" id="console">
            <div class="log system">Initializing QRT Threat Verification Engine...</div>
            <div class="log system">Standing by for incoming CAP (Common Alerting Protocol) signals.</div>
        </div>

        <button class="btn-trigger" id="triggerBtn" onclick="runSimulation()">Trigger Live Alert</button>
    </div>

    <div class="mobile-view">
        <div class="phone" id="mobilePhone">
            <div class="phone-screen" id="phoneScreen">
                <div class="alert-header">
                    <span class="alert-icon">⚠️</span> EMERGENCY ALERT
                </div>
                <div class="alert-body">
                    <span class="threat-title" id="dynThreatType">...</span>
                    <span class="meta-data" id="dynMetaData">...</span>
                    <span class="instructions" id="dynInstructions">...</span>
                    
                    <em style="font-size: 12px; opacity: 0.8;">- Quick Response Team (QRT)</em>
                </div>
            </div>
        </div>
    </div>

    <script>
        const consoleBox = document.getElementById('console');
        const phone = document.getElementById('mobilePhone');
        const btn = document.getElementById('triggerBtn');

        // Array of different threat scenarios
        const hazardDatabase = [
            {
                category: "BIOLOGICAL HAZARD",
                location: "Gorakhpur, Uttar Pradesh (5km Radius)",
                instructions: "Unknown viral particulate detected in atmosphere. Immediately move indoors. Seal all windows and doors. Disable HVAC systems. Await further instructions."
            },
            {
                category: "SEISMIC ACTIVITY",
                location: "Gorakhpur & Surrounding (Epicenter 12km away)",
                instructions: "Magnitude 6.8 earthquake detected. Drop, cover, and hold on. Evacuate unstable structures immediately after shaking stops. Beware of aftershocks."
            },
            {
                category: "HAZMAT INCIDENT",
                location: "Gorakhpur Industrial Sector (Zone B)",
                instructions: "Toxic chemical leak confirmed. Evacuate a 3km radius immediately. Move crosswind from the affected area. Cover nose and mouth with a wet cloth."
            },
            {
                category: "SEVERE WEATHER",
                location: "Eastern UP / Gorakhpur District",
                instructions: "Category 4 Cyclone approaching. Wind speeds exceeding 150km/h expected. Seek shelter in reinforced interior rooms. Stay away from windows."
            },
            {
                category: "SECURITY THREAT",
                location: "Gorakhpur City Center",
                instructions: "Active security breach reported. Seek immediate cover. Lock all doors, stay away from windows, and silence mobile devices. Await all-clear from authorities."
            }
        ];

        function addLog(message, type = 'system') {
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.innerText = message;
            consoleBox.appendChild(div);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function runSimulation() {
            btn.disabled = true;
            btn.innerText = "TRANSMITTING...";
            
            // Reset phone UI for consecutive simulations
            phone.classList.remove('active', 'flashing');
            phone.style.backgroundColor = "#000";
            
            // Select a random hazard from the database
            const randomHazard = hazardDatabase[Math.floor(Math.random() * hazardDatabase.length)];
            const currentTime = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', hour12: true });
            
            const incomingPayload = {
                category: randomHazard.category,
                location: randomHazard.location,
                time: currentTime + " IST",
                instructions: randomHazard.instructions
            };

            // Simulating the backend sequence
            addLog("\n-------------------------------------------------", "system");
            setTimeout(() => addLog("> Incoming CAP payload detected. Analyzing...", "system"), 500);
            setTimeout(() => addLog(`> Threat Classified: ${incomingPayload.category}`, "alert"), 1500);
            setTimeout(() => addLog(`> Target Zone: ${incomingPayload.location}`, "system"), 2500);
            
            setTimeout(() => addLog("> Initiating Geofence... Locking IPs...", "system"), 3500);
            setTimeout(() => addLog("> TARGET LOCKED: IP 192.168.1.10", "success"), 4500);
            setTimeout(() => addLog("> TARGET LOCKED: IP 10.0.0.5", "success"), 4800);
            
            setTimeout(() => addLog("> Compiling alert package with timestamp...", "system"), 5500);
            setTimeout(() => addLog("> [C++] Broadcasting payloads to target devices...", "alert"), 6500);
            
            // Trigger the mobile phone UI and inject the dynamic data
            setTimeout(() => {
                addLog("> [SENT] CRITICAL ALERT delivered successfully.", "success");
                
                // Injecting the data into the DOM
                document.getElementById('dynThreatType').innerText = incomingPayload.category;
                document.getElementById('dynMetaData').innerHTML = `<strong>Time:</strong> ${incomingPayload.time} <br> <strong>Zone:</strong> ${incomingPayload.location}`;
                document.getElementById('dynInstructions').innerText = incomingPayload.instructions;

                phone.classList.add('flashing');
                phone.classList.add('active');
                
                // Stop flashing after 3.5 seconds, keep solid red
                setTimeout(() => {
                    phone.classList.remove('flashing');
                    phone.style.backgroundColor = "#da3633"; 
                    btn.innerText = "STANDBY MODE";
                    btn.disabled = false; 
                }, 3500);
                
            }, 7000);
        }
    </script>
</body>
</html>
